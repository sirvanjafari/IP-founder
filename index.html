<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>Advanced System Info</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        .container { border: 1px solid #00ff41; padding: 20px; border-radius: 10px; max-width: 450px; margin: auto; }
        button { background: #00ff41; border: none; padding: 10px; cursor: pointer; margin-top: 15px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <div class="container" id="info">در حال دریافت اطلاعات...</div>
    <button onclick="toggleLanguage()">تغییر زبان / Change Language</button>

    <script>
        let isPersian = true;

        function getOperatorName(org) {
            let name = org.toLowerCase();
            if (name.includes("irancell")) return isPersian ? "ایرانسل" : "Irancell";
            if (name.includes("mci") || name.includes("mobile company of iran")) return isPersian ? "همراه اول" : "MCI";
            if (name.includes("rightel")) return isPersian ? "رایتل" : "Rightel";
            if (name.includes("telecommunication")) return isPersian ? "مخابرات" : "TCI";
            return org;
        }

        async function updateData() {
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            
            let battery = await navigator.getBattery();
            let connection = navigator.connection || {};

            let infoObj = {
                "IP": data.ip,
                "Operator": getOperatorName(data.org),
                "Connection": connection.type ? connection.type : "نامشخص",
                "Battery": Math.round(battery.level * 100) + "%",
                "Resolution": screen.width + "x" + screen.height,
                "City": data.city
            };

            display(infoObj);
        }

        function display(info) {
            let result = "";
            let labels = {
                "IP": isPersian ? "آدرس آی‌پی" : "IP",
                "Operator": isPersian ? "اپراتور" : "Operator",
                "Connection": isPersian ? "نوع اتصال" : "Connection",
                "Battery": isPersian ? "باتری" : "Battery",
                "Resolution": isPersian ? "رزولوشن" : "Resolution",
                "City": isPersian ? "شهر" : "City"
            };

            for (let key in info) {
                result = result + (labels[key]) + ": " + info[key] + "<br>";
            }
            document.getElementById('info').innerHTML = result;
        }

        function toggleLanguage() {
            isPersian = !isPersian;
            updateData();
        }

        updateData();
    </script>
</body>
</html>
